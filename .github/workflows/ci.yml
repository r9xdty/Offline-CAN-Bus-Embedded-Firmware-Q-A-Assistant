name: tests

# Runs the offline unit suite on every push and pull request. These tests fake the embed/chat
# functions and mock pypdf, so they need neither a GPU nor the Foundry Local runtime — only
# numpy and pytest.
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip numpy pytest

      - name: Run offline test suite
        run: python -m pytest tests/ -q
